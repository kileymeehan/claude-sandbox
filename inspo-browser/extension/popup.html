<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      background: #111118;
      color: #e2e2f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1f1f2e;
    }
    .logo {
      font-size: 15px;
      font-weight: 600;
      color: #e2e2f0;
      letter-spacing: -0.01em;
    }
    .logo span { color: #6366f1; }
    .gear-btn {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: #4b5563;
      padding: 3px;
      border-radius: 5px;
      display: flex;
      align-items: center;
    }
    .gear-btn:hover { color: #e2e2f0; }
    .gear-btn.active { color: #6366f1; }

    .section { padding: 14px 16px; }

    .pick-btn {
      width: 100%;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.1s;
    }
    .pick-btn:hover { background: #4f52e0; }
    .pick-btn:disabled { background: #2a2a3e; color: #4b5563; cursor: default; }

    .divider {
      height: 1px;
      background: #1f1f2e;
      margin: 10px 0;
    }

    .shot-row {
      display: flex;
      gap: 7px;
    }

    .shot-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      color: #a5b4fc;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 6px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .shot-btn:hover { background: #2a2a3e; border-color: #6366f1; }

    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: #4b5563;
      text-align: center;
      line-height: 1.5;
    }

    .settings { display: none; padding: 14px 16px; border-top: 1px solid #1f1f2e; }
    .settings.open { display: block; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      color: #e2e2f0;
      font-size: 12px;
      padding: 7px 9px;
      outline: none;
      margin-bottom: 10px;
      font-family: inherit;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #374151; }

    .save-btn {
      width: 100%;
      background: #1f1f2e;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      color: #a5b4fc;
      font-size: 12px;
      font-weight: 500;
      padding: 7px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .save-btn:hover { background: #2a2a3e; }

    .status {
      margin-top: 8px;
      font-size: 11px;
      text-align: center;
      color: #6366f1;
      min-height: 14px;
    }

    .flow-select-row {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #6b7280;
      font-size: 11.5px;
    }
    .flow-select-label { white-space: nowrap; }
    .flow-select-row select {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 5px;
      color: #e2e2f0;
      font-size: 11.5px;
      padding: 4px 6px;
      outline: none;
      cursor: pointer;
    }
    .flow-select-row select:focus { border-color: #6366f1; }

    .not-configured {
      padding: 16px;
      text-align: center;
      color: #4b5563;
      line-height: 1.6;
      font-size: 12px;
    }
    .not-configured strong { color: #a5b4fc; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" width="18" height="18" style="border-radius:4px">
    <span class="logo">Swatch<span>Book</span></span>
    <button class="gear-btn" id="gear-btn" title="Settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div id="main-section" class="section" style="display:none">
    <button class="pick-btn" id="pick-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      Pick images from this page
    </button>

    <div class="divider"></div>

    <div class="shot-row">
      <button class="shot-btn" id="shot-full-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        Screenshot view
      </button>
      <button class="shot-btn" id="shot-area-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
        Select area
      </button>
    </div>

    <p class="hint">Or right-click any image → <strong>Save to SwatchBook</strong></p>
    <div class="divider"></div>
    <div id="flow-selector-row" class="flow-select-row" style="display:none">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span class="flow-select-label">Flow</span>
      <select id="flow-select">
        <option value="">None</option>
      </select>
    </div>
  </div>

  <div id="setup-section" class="not-configured" style="display:none">
    <strong>Set up SwatchBook</strong>
    Open settings (gear icon) to add your server URL and API token.
  </div>

  <div class="settings" id="settings-panel">
    <label>Server URL</label>
    <input id="server-url" type="url" placeholder="https://your-app.railway.app">
    <label>API Token</label>
    <input id="api-token" type="password" placeholder="Your INSPO_API_TOKEN">
    <button class="save-btn" id="save-btn">Save settings</button>
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
