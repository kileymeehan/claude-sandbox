<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspo Browser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Inspo</span>
        </div>
        <div class="header-actions">
          <button id="theme-btn" title="Toggle light/dark">
            <svg id="theme-icon-dark" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg id="theme-icon-light" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <button id="sync-btn" title="Sync &amp; categorize inbox">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
          <button id="refresh-btn" title="Refresh library">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="section-label">Folders</div>
        <nav id="folder-nav"></nav>
      </div>

      <div class="sidebar-section" id="project-nav-section">
        <div class="section-label-row">
          <span class="section-label">Projects</span>
          <button id="new-project-btn" title="New project">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <nav id="project-nav"></nav>
      </div>

      <div class="sidebar-section" id="tag-nav-section" style="display:none">
        <div class="section-label">Tags</div>
        <nav id="tag-nav"></nav>
      </div>
    </aside>

    <main id="main">
      <div id="gallery-header">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input id="search" type="text" placeholder="Search images…" autocomplete="off" spellcheck="false">
        </div>
        <span id="image-count"></span>
        <div class="view-toggle">
          <button class="view-btn" data-view="grid-small" title="Small grid">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" data-view="grid-large" title="Large grid">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="9" height="9"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" data-view="list" title="List view">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div id="gallery"></div>
      <div id="empty-state" class="hidden">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <p>No images found</p>
      </div>
    </main>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="hidden">
    <div id="lb-overlay"></div>
    <div id="lb-shell">
      <div id="lb-image-area">
        <button id="lb-prev" title="Previous (←)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div id="lb-img-wrap">
          <img id="lb-img" src="" alt="">
        </div>
        <button id="lb-next" title="Next (→)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div id="lb-panel">
        <div id="lb-panel-top">
          <button id="lb-close" title="Close (Esc)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="lb-meta">
          <div id="lb-filename"></div>
          <div id="lb-folder-badge-wrap"></div>
        </div>
        <div id="lb-projects-section">
          <div class="section-label">Projects</div>
          <div id="lb-projects"></div>
          <button id="lb-new-project-btn" class="lb-new-project-btn">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New project…
          </button>
        </div>
        <div id="lb-tags-section">
          <div class="section-label">Tags</div>
          <div id="lb-tags"></div>
          <div id="lb-tag-input-wrap">
            <input id="lb-tag-input" type="text" placeholder="Add tag, press Enter…" autocomplete="off" spellcheck="false">
            <ul id="lb-tag-suggestions"></ul>
          </div>
        </div>
        <div id="lb-actions">
          <a id="lb-download" class="btn-download" href="" download="">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3"/><path d="M8 11l4 4 4-4"/><path d="M20 21H4"/></svg>
            Download
          </a>
        </div>
        <div id="lb-counter"></div>
      </div>
    </div>
  </div>

  <!-- New Project Modal -->
  <div id="project-modal" class="hidden">
    <div id="project-modal-overlay"></div>
    <div id="project-modal-box">
      <div id="project-modal-title">New Project</div>
      <input id="project-modal-input" type="text" placeholder="Project name…" autocomplete="off" spellcheck="false">
      <div id="project-modal-actions">
        <button id="project-modal-cancel">Cancel</button>
        <button id="project-modal-create">Create</button>
      </div>
    </div>
  </div>

  <div id="sync-toast" class="hidden">
    <div id="sync-toast-inner">
      <span id="sync-toast-msg"></span>
      <button id="sync-toast-close">✕</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
